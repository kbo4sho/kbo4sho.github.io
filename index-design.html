<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kevin Bolander — Portfolio Moved</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="The design-engineering portfolio variant has moved into Kevin Bolander's canonical portfolio.">
  <link rel="canonical" href="https://kbo4sho.github.io/">
  <meta http-equiv="refresh" content="0; url=/">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --border: #222;
      --teal: #00d4aa;
      --text: #e8e8e8;
      --text-dim: #999;
      --font-body: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-mono: "JetBrains Mono", monospace;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 2rem;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.6;
    }

    main {
      width: min(100%, 44rem);
      padding: 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    p:first-child {
      margin: 0 0 0.75rem;
      color: var(--teal);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 1rem;
      font-size: clamp(2rem, 6vw, 3.25rem);
      line-height: 1;
    }

    p {
      margin: 0 0 1.5rem;
      color: var(--text-dim);
    }

    a {
      color: var(--teal);
      text-decoration: none;
      border-bottom: 1px solid currentColor;
      font-family: var(--font-mono);
      font-size: 0.85rem;
    }

    a:focus-visible {
      outline: 2px solid var(--teal);
      outline-offset: 4px;
    }
  </style>
</head>
<body>
  <main>
    <p>Canonical portfolio</p>
    <h1>Portfolio moved</h1>
    <p>The design-system and AI product work now live together on Kevin Bolander's canonical portfolio.</p>
    <a href="/">Go to kbo4sho.github.io</a>
  </main>
</body>
</html>
