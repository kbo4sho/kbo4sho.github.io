<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MakeMeA - Changed People Variant</title>
  <meta name="description" content="Alternate MakeMeA gallery mockup with a changed set of people and style samples.">
  <style>
    :root {
      --bg: #08080e;
      --panel: #1b1b22;
      --panel-hover: #24242d;
      --text: #f7f7fb;
      --muted: #818089;
      --line: #25252d;
      --line-strong: #33333d;
      --cream: #eadbbd;
      --shadow: 0 22px 56px rgba(0, 0, 0, 0.36);
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 15%, rgba(255, 255, 255, 0.035), transparent 31rem),
        linear-gradient(180deg, #090910 0%, #08080e 46%, #07070c 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .site-header {
      height: 112px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(28px, 4.4vw, 92px);
    }

    .brand {
      color: var(--text);
      font-size: clamp(1.8rem, 2.2vw, 2.55rem);
      font-weight: 750;
      letter-spacing: 0;
      line-height: 1;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: clamp(22px, 2.2vw, 34px);
      color: #7f7e87;
      font-size: clamp(0.98rem, 1.1vw, 1.33rem);
      font-weight: 500;
    }

    .nav a {
      transition: color 180ms ease;
    }

    .nav a:hover,
    .nav a:focus-visible {
      color: var(--text);
    }

    .signin {
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: var(--panel);
      color: #a8a6ad;
      padding: 0.86rem 1.25rem;
      box-shadow: inset 0 1px rgba(255, 255, 255, 0.03);
    }

    .signin:hover,
    .signin:focus-visible {
      background: var(--panel-hover);
      color: var(--text);
      text-decoration: none;
    }

    .hero {
      width: min(100%, 1120px);
      margin: 0 auto;
      padding: clamp(4rem, 7vw, 5.1rem) 24px 4rem;
      text-align: center;
    }

    h1 {
      color: var(--text);
      font-size: clamp(3.05rem, 6.2vw, 5rem);
      line-height: 0.98;
      font-weight: 760;
      letter-spacing: 0;
      margin-bottom: 1.1rem;
    }

    h1 .accent {
      color: var(--cream);
    }

    .subtitle {
      color: #7e7d86;
      font-size: clamp(1.08rem, 1.35vw, 1.5rem);
      font-weight: 520;
      letter-spacing: 0;
      line-height: 1.45;
      margin-bottom: clamp(3.1rem, 5vw, 3.55rem);
    }

    .style-grid {
      --tile: min(318px, calc((100vw - 96px) / 3));
      display: grid;
      grid-template-columns: repeat(3, var(--tile));
      gap: 20px;
      justify-content: center;
      align-items: start;
      list-style: none;
    }

    .style-card {
      position: relative;
      display: block;
      width: var(--tile);
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: 8px;
      background: #15151b;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: var(--shadow);
      isolation: isolate;
      transform: translateZ(0);
    }

    .style-card::before,
    .style-card::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .style-card::before {
      background:
        linear-gradient(180deg, transparent 52%, rgba(0, 0, 0, 0.61) 100%),
        linear-gradient(0deg, rgba(255, 255, 255, 0.06), transparent 42%);
    }

    .style-card::after {
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: inherit;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.11);
    }

    .style-card img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transition: transform 220ms ease, filter 220ms ease;
    }

    .style-card:hover img,
    .style-card:focus-visible img {
      transform: scale(1.035);
      filter: saturate(1.05) contrast(1.02);
    }

    .style-card:focus-visible {
      outline: 2px solid #f0dfba;
      outline-offset: 4px;
    }

    .label {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 13px;
      z-index: 3;
      color: rgba(255, 255, 255, 0.82);
      font-size: clamp(1.01rem, 1.15vw, 1.22rem);
      font-weight: 520;
      line-height: 1.15;
      text-align: center;
      text-shadow: 0 1px 14px rgba(0, 0, 0, 0.76);
      padding: 0 0.75rem;
    }

    @media (max-width: 900px) {
      .site-header {
        height: auto;
        min-height: 88px;
        align-items: flex-start;
        gap: 1rem;
        padding: 1.5rem 24px;
      }

      .nav {
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 12px 18px;
      }

      .style-grid {
        --tile: min(336px, calc((100vw - 68px) / 2));
        grid-template-columns: repeat(2, var(--tile));
        gap: 18px;
      }
    }

    @media (max-width: 620px) {
      .site-header {
        flex-direction: column;
        align-items: stretch;
      }

      .brand {
        font-size: 2rem;
      }

      .nav {
        justify-content: flex-start;
        font-size: 1rem;
      }

      .signin {
        padding: 0.62rem 0.85rem;
      }

      .hero {
        padding-top: 3.4rem;
      }

      .style-grid {
        --tile: min(360px, calc(100vw - 40px));
        grid-template-columns: var(--tile);
      }
    }
  </style>
</head>
<body>
  <header class="site-header" aria-label="MakeMeA">
    <a class="brand" href="#">MakeMeA</a>
    <nav class="nav" aria-label="Primary navigation">
      <a href="#">Styles</a>
      <a href="#">Blog</a>
      <a href="#">Pricing</a>
      <a class="signin" href="#">Sign In</a>
    </nav>
  </header>

  <main class="hero">
    <h1>make any face <span class="accent">funnier</span></h1>
    <p class="subtitle">pick one. upload your photo. send it to a friend.</p>

    <ul class="style-grid" aria-label="AI face style samples">
      <li>
        <a class="style-card" href="#" aria-label="Karaoke sneeze style">
          <img src="assets/makemea-v2/karaoke-sneeze.png" alt="A woman singing into a microphone with a comic sneeze expression">
          <span class="label">karaoke sneeze</span>
        </a>
      </li>
      <li>
        <a class="style-card" href="#" aria-label="Boardroom caricature style">
          <img src="assets/makemea-v2/boardroom-caricature.png" alt="A laughing illustrated man in a blazer drawn as a warm caricature">
          <span class="label">boardroom caricature</span>
        </a>
      </li>
      <li>
        <a class="style-card" href="#" aria-label="Festival glam style">
          <img src="assets/makemea-v2/festival-glam.png" alt="A woman with ribbon hair accents and bright festival makeup">
          <span class="label">festival glam</span>
        </a>
      </li>
      <li>
        <a class="style-card" href="#" aria-label="Desk toy hero style">
          <img src="assets/makemea-v2/desk-toy-hero.png" alt="A glossy toy-avatar person sitting on a desk with tiny figurines">
          <span class="label">desk toy hero</span>
        </a>
      </li>
      <li>
        <a class="style-card" href="#" aria-label="Sunset polaroid style">
          <img src="assets/makemea-v2/sunset-polaroid.png" alt="A smiling man holding an instant photo in golden sunset light">
          <span class="label">sunset polaroid</span>
        </a>
      </li>
      <li>
        <a class="style-card" href="#" aria-label="Opera laugh style">
          <img src="assets/makemea-v2/opera-laugh.png" alt="A painterly woman laughing dramatically in a red turtleneck">
          <span class="label">opera laugh</span>
        </a>
      </li>
      <li>
        <a class="style-card" href="#" aria-label="Noir glam style">
          <img src="assets/makemea-v2/noir-glam.png" alt="A woman laughing in moody black and gold studio lighting">
          <span class="label">noir glam</span>
        </a>
      </li>
      <li>
        <a class="style-card" href="#" aria-label="Burger crown style">
          <img src="assets/makemea-v2/burger-crown.png" alt="A smiling person with round glasses wearing a playful burger crown hat">
          <span class="label">burger crown</span>
        </a>
      </li>
      <li>
        <a class="style-card" href="#" aria-label="Clay selfie style">
          <img src="assets/makemea-v2/clay-selfie.png" alt="A claymation-style woman with gray braids waving with a big grin">
          <span class="label">clay selfie</span>
        </a>
      </li>
    </ul>
  </main>
</body>
</html>
